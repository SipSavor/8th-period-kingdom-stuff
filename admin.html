<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Kingdom of 8th</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #064e3b; 
            --primary-hover: #065f46;
            --accent: #d97706;  
            --bg-light: #f8fafc;
            --surface: #ffffff;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius: 12px;
        }

        * {
            box-sizing: border-box; margin: 0; padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
        }

        nav {
            background-color: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.25rem; font-weight: 700; color: var(--primary); text-decoration: none;
        }

        .btn-outline {
            padding: 0.5rem 1rem; border: 1px solid var(--border); background: transparent;
            border-radius: 8px; font-weight: 600; color: var(--text-dark); cursor: pointer; text-decoration: none;
        }

        .btn-outline:hover { background-color: var(--bg-light); }

        main {
            max-width: 900px; margin: 3rem auto; padding: 0 2rem;
        }

        #admin-area { display: none; }
        #loading-message { text-align: center; font-size: 1.2rem; color: var(--text-muted); margin-top: 4rem; }

        .card {
            background-color: var(--surface); padding: 2rem; border-radius: var(--radius);
            border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        h1 { margin-bottom: 0.5rem; color: var(--primary); }
        p.subtitle { color: var(--text-muted); margin-bottom: 2rem; }

        /* Table Styles */
        table {
            width: 100%; border-collapse: collapse; margin-top: 1rem;
        }

        th, td {
            text-align: left; padding: 1rem; border-bottom: 1px solid var(--border);
        }

        th {
            background-color: var(--bg-light); font-weight: 600; color: var(--text-muted);
        }

        select {
            padding: 0.5rem; border-radius: 6px; border: 1px solid var(--border);
            font-family: inherit; font-size: 0.9rem;
        }

        .btn-save {
            background-color: var(--primary); color: white; border: none; padding: 0.5rem 1rem;
            border-radius: 6px; font-weight: 600; cursor: pointer; transition: 0.2s;
        }
        
        .btn-save:hover { background-color: var(--primary-hover); }
        .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }

    </style>
</head>
<body>

    <nav>
        <a href="dashboard.html" class="logo">🏛️ Kingdom of 8th</a>
        <a href="dashboard.html" class="btn-outline">← Back to Dashboard</a>
    </nav>

    <main>
        <div id="loading-message">Verifying admin credentials...</div>

        <div id="admin-area">
            <div class="card">
                <h1>Citizen Management</h1>
                <p class="subtitle">Assign roles and ranks to the citizens of your classroom.</p>

                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Current Role</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="user-table-body">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, getDocs, updateDoc } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCNbW2UTw62V4ojtXd_F0ZbEbn9JWHFV7c",
            authDomain: "thperiodwebsite.firebaseapp.com",
            projectId: "thperiodwebsite",
            storageBucket: "thperiodwebsite.firebasestorage.app",
            messagingSenderId: "1035004245969",
            appId: "1:1035004245969:web:f025b31117173da88a52f0",
            measurementId: "G-2VM1MDHR3T"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const loadingMessage = document.getElementById('loading-message');
        const adminArea = document.getElementById('admin-area');
        const userTableBody = document.getElementById('user-table-body');

        // --- SECURITY CHECK ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userDocRef = doc(db, "users", user.uid);
                const userDocSnap = await getDoc(userDocRef);

                if (userDocSnap.exists() && userDocSnap.data().role === "admin") {
                    // Access Granted! Load users.
                    loadingMessage.style.display = 'none';
                    adminArea.style.display = 'block';
                    loadAllUsers();
                } else {
                    alert("Access Denied: You must be an Admin to view this page.");
                    window.location.href = "dashboard.html";
                }
            } else {
                window.location.href = "index.html";
            }
        });

        // --- FETCH AND DISPLAY ALL USERS ---
        async function loadAllUsers() {
            userTableBody.innerHTML = "<tr><td colspan='4'>Loading citizens...</td></tr>";
            
            try {
                const querySnapshot = await getDocs(collection(db, "users"));
                userTableBody.innerHTML = ""; // Clear loading text

                querySnapshot.forEach((docSnap) => {
                    const userData = docSnap.data();
                    
                    // Create a row for each user
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><strong>${userData.name}</strong></td>
                        <td>${userData.email}</td>
                        <td>
                            <select id="role-${userData.uid}">
                                <option value="citizen" ${userData.role === 'citizen' ? 'selected' : ''}>Citizen</option>
                                <option value="chancellor" ${userData.role === 'chancellor' ? 'selected' : ''}>Chancellor</option>
                                <option value="judge" ${userData.role === 'judge' ? 'selected' : ''}>Judge</option>
                                <option value="admin" ${userData.role === 'admin' ? 'selected' : ''}>Admin</option>
                            </select>
                        </td>
                        <td>
                            <button class="btn-save" onclick="updateUserRole('${userData.uid}')" id="btn-${userData.uid}">Update</button>
                        </td>
                    `;
                    userTableBody.appendChild(tr);
                });
            } catch (error) {
                console.error("Error fetching users:", error);
                userTableBody.innerHTML = "<tr><td colspan='4'>Error loading data.</td></tr>";
            }
        }

        // --- UPDATE ROLE IN FIRESTORE ---
        // We attach this to the window object so the inline onclick button can trigger it
        window.updateUserRole = async function(uid) {
            const newRole = document.getElementById(`role-${uid}`).value;
            const button = document.getElementById(`btn-${uid}`);
            
            button.innerText = "Saving...";
            button.disabled = true;

            try {
                const userRef = doc(db, "users", uid);
                await updateDoc(userRef, {
                    role: newRole
                });
                button.innerText = "Saved!";
                button.style.backgroundColor = "#059669"; // Turn green temporarily
                
                setTimeout(() => {
                    button.innerText = "Update";
                    button.style.backgroundColor = "var(--primary)";
                    button.disabled = false;
                }, 2000);

            } catch (error) {
                console.error("Error updating role:", error);
                alert("Failed to update role. Check your database rules.");
                button.innerText = "Update";
                button.disabled = false;
            }
        };
    </script>
</body>
</html>
