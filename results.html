<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voting Results | Kingdom of 8th</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #064e3b; 
            --primary-hover: #065f46;
            --accent: #d97706;  
            --bg-light: #f8fafc;
            --surface: #ffffff;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            -webkit-font-smoothing: antialiased;
        }

        /* Navigation Bar */
        nav {
            background-color: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--primary);
            text-decoration: none;
        }

        .btn-outline {
            padding: 0.5rem 1rem;
            border: 1px solid var(--border);
            background: transparent;
            border-radius: 8px;
            font-family: inherit;
            font-weight: 600;
            color: var(--text-dark);
            cursor: pointer;
            text-decoration: none;
            transition: 0.2s ease;
        }

        .btn-outline:hover {
            background-color: var(--bg-light);
        }

        /* Main Content */
        main {
            max-width: 900px; 
            margin: 3rem auto;
            padding: 0 2rem;
        }

        .page-header {
            margin-bottom: 2rem;
            text-align: center;
        }

        .page-header h1 {
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .page-header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        /* Chart Containers - Now stacked top-to-bottom */
        .chart-grid {
            display: flex;
            flex-direction: column; /* Forces them to stack vertically */
            gap: 2.5rem;
            margin-bottom: 3rem;
            max-width: 750px; /* Keeps the charts wide, but not absurdly stretched on giant monitors */
            margin-left: auto;
            margin-right: auto;
        }

        .chart-card {
            background-color: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            padding: 1.5rem;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 400px;
        }

        .chart-card iframe {
            width: 100%;
            height: 400px; /* Giving it a little extra height to ensure nothing gets cut off */
            border: none;
            border-radius: 8px;
        }

        .chart-title {
            font-weight: 600;
            font-size: 1.25rem;
            color: var(--primary);
            margin-bottom: 1rem;
            width: 100%;
            text-align: left;
        }

    </style>
</head>
<body>

    <nav>
        <div class="logo">🏛️ Kingdom of 8th</div>
        <a href="dashboard.html" class="btn-outline">← Back to Dashboard</a>
    </nav>

    <main>
        <div class="page-header">
            <h1>Voting Results Floor</h1>
            <p>Live visual tracking of proposed legislation and elections in the Kingdom.</p>
        </div>

        <div class="chart-grid">
            
            <div class="chart-card">
                <div class="chart-title">Chancellor Election</div>
                <iframe width="600" height="371" seamless frameborder="0" scrolling="no" src="https://docs.google.com/spreadsheets/d/e/2PACX-1vS-D0RGnMdV1WuOp3aXVcqdKhN3B0MpL9KlpXToWlbNv6ENsm07_A9MpWFktXFxEKXXOKpRBe9_F9OS/pubchart?oid=19246679&amp;format=interactive"></iframe>
            </div>

            <div class="chart-card">
                <div class="chart-title">Judge Election</div>
                <iframe width="600" height="371" seamless frameborder="0" scrolling="no" src="https://docs.google.com/spreadsheets/d/e/2PACX-1vS-D0RGnMdV1WuOp3aXVcqdKhN3B0MpL9KlpXToWlbNv6ENsm07_A9MpWFktXFxEKXXOKpRBe9_F9OS/pubchart?oid=430616458&amp;format=interactive"></iframe>
            </div>

        </div>
    </main>

</body>
</html>
