<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Town Hall | Kingdom of 8th</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #064e3b; 
            --primary-hover: #065f46;
            --accent: #d97706;  
            --bg-light: #f8fafc;
            --surface: #ffffff;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius: 12px;
            --shadow-sm: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            -webkit-font-smoothing: antialiased;
        }

        /* Navigation Bar */
        nav {
            background-color: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-sm);
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--primary);
            text-decoration: none;
        }

        .btn-outline {
            padding: 0.5rem 1.25rem;
            border: 1px solid var(--border);
            background: var(--surface);
            border-radius: 8px;
            font-family: inherit;
            font-weight: 600;
            color: var(--text-dark);
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .btn-outline:hover {
            background-color: #f1f5f9;
            border-color: #cbd5e1;
        }

        /* Main Content Layout */
        main {
            max-width: 1000px;
            margin: 3rem auto;
            padding: 0 2rem;
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }

        .header {
            text-align: center;
            margin-bottom: 1rem;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        /* Discussion Board */
        .discussion-section {
            background-color: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            display: flex;
            flex-direction: column;
            height: 600px; /* Increased height since the bill is gone */
        }

        .discussion-header {
            padding: 1.25rem;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            font-size: 1.1rem;
            background-color: #f8fafc;
            border-radius: var(--radius) var(--radius) 0 0;
        }

        .message-board {
            flex-grow: 1;
            padding: 1.5rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .message {
            display: flex;
            gap: 1rem;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background-color: var(--primary);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            flex-shrink: 0;
        }

        .message-content {
            background-color: #f1f5f9;
            padding: 1rem;
            border-radius: 0 12px 12px 12px;
            width: fit-content;
            max-width: 80%;
        }

        .message-author {
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 0.25rem;
            display: flex;
            justify-content: space-between;
            gap: 1rem;
        }

        .message-time {
            color: var(--text-muted);
            font-size: 0.75rem;
            font-weight: 400;
        }

        .message-text {
            font-size: 0.95rem;
            line-height: 1.4;
        }

        /* Input Area */
        .input-area {
            padding: 1.25rem;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 1rem;
        }

        .input-area input {
            flex-grow: 1;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-area input:focus {
            border-color: var(--primary);
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            font-family: inherit;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">🏛️ Kingdom of 8th</div>
        <a href="dashboard.html" class="btn-outline">← Back to Dashboard</a>
    </nav>

    <main>
        <div class="header">
            <h1>🗣️ Town Hall</h1>
            <p>Debate with your fellow citizens on the active issues.</p>
        </div>

        <div class="discussion-section">
            <div class="discussion-header">
                💬 Live Debate
            </div>
            
            <div class="message-board" id="messageBoard">
                </div>

            <div class="input-area">
                <input type="text" id="chatInput" placeholder="State your argument..." autocomplete="off">
                <button class="btn-primary" id="sendBtn">Post</button>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

        // Your Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCYbYKtFnZKCRBRLKV0_MQgj1ADzehz048",
            authDomain: "text01-6527c.firebaseapp.com",
            projectId: "text01-6527c",
            storageBucket: "text01-6527c.firebasestorage.app",
            messagingSenderId: "487919743026",
            appId: "1:487919743026:web:805c0be8d7cefa2d6fcc2b",
            measurementId: "G-L7J7L5D5LV"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = { name: "Citizen", initial: "C" };

        // Check user session
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser.name = user.displayName || "Citizen";
                currentUser.initial = currentUser.name.charAt(0).toUpperCase();
            } else {
                window.location.href = "index.html"; // Kick out if not logged in
            }
        });

        // --- REAL-TIME CHAT LOGIC ---
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');
        const messageBoard = document.getElementById('messageBoard');
        const messagesRef = collection(db, "messages");

        // Listen for live database updates
        const q = query(messagesRef, orderBy("createdAt", "asc"));
        
        onSnapshot(q, (snapshot) => {
            snapshot.docChanges().forEach((change) => {
                if (change.type === "added") {
                    const data = change.doc.data();
                    
                    // Format timestamp (handles 'pending' local time before server confirms)
                    let timeString = "Just now";
                    if (data.createdAt) {
                        const date = data.createdAt.toDate();
                        timeString = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    }

                    // Render to HTML
                    const msgHTML = `
                        <div class="message">
                            <div class="avatar" style="background-color: var(--text-dark);">${data.authorInitial}</div>
                            <div class="message-content">
                                <div class="message-author">${data.authorName} <span class="message-time">${timeString}</span></div>
                                <div class="message-text">${data.text}</div>
                            </div>
                        </div>
                    `;
                    messageBoard.insertAdjacentHTML('beforeend', msgHTML);
                    
                    // Auto-scroll to bottom
                    messageBoard.scrollTop = messageBoard.scrollHeight;
                }
            });
        });

        // Send new message to Database
        async function postMessage() {
            const text = chatInput.value.trim();
            if (text === "") return;

            // Clear input immediately for better UI feel
            chatInput.value = "";

            try {
                await addDoc(messagesRef, {
                    text: text,
                    authorName: currentUser.name,
                    authorInitial: currentUser.initial,
                    createdAt: serverTimestamp() // Official Firestore timestamp
                });
            } catch (error) {
                console.error("Error sending message: ", error);
                alert("Failed to send message.");
            }
        }

        // Trigger post on button click or Enter key
        sendBtn.addEventListener('click', postMessage);
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') postMessage();
        });
    </script>
</body>
</html>
